<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>터미널군 클럽 — InsightLab 로열티</title>
<style>
:root{
  --ink:#060507;
  --cream:#F5F3F7;
  --mut:rgba(245,243,247,.62);
  --line:rgba(245,243,247,.12);
  --card:rgba(245,243,247,.05);
  --orange:#FF8C42;
  --pink:#EC4899;
  --purple:#8B5CF6;
  --green:#37d67a;
  --grad:linear-gradient(100deg,#FF8C42 0%,#EC4899 52%,#8B5CF6 100%);
  --mono:"JetBrains Mono",ui-monospace,Consolas,monospace;
  --kr:"Pretendard",system-ui,-apple-system,"Segoe UI",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;word-break:keep-all;overflow-wrap:break-word;-webkit-tap-highlight-color:transparent}
body{
  background:var(--ink);color:var(--cream);font-family:var(--kr);line-height:1.75;
  min-height:100dvh;padding:32px 20px 60px;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(700px 400px at 10% -5%, rgba(255,140,66,.10), transparent 60%),
    radial-gradient(800px 500px at 95% 0%, rgba(139,92,246,.12), transparent 60%),
    radial-gradient(700px 500px at 50% 110%, rgba(236,72,153,.08), transparent 60%);
}
.wrap{position:relative;z-index:1;max-width:760px;margin:0 auto}

header{text-align:center;margin-bottom:24px}
header img{width:84px;margin-bottom:10px}
.brand{font-family:var(--mono);font-size:12px;letter-spacing:.22em;color:var(--mut);text-transform:uppercase;margin-bottom:8px}
.brand b{color:var(--cream)}
h1{font-size:clamp(26px,5vw,38px);font-weight:800;line-height:1.35}
h1 .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{margin-top:6px;font-size:14px;color:var(--mut)}
.sub code{font-family:var(--mono);color:var(--green);font-size:13px}

.card{border:1px solid var(--line);border-radius:18px;padding:22px;background:var(--card);margin-bottom:18px}
.card h3{font-family:var(--mono);font-size:12px;letter-spacing:.22em;color:var(--mut);text-transform:uppercase;margin-bottom:14px}
.card h3 em{font-style:normal;color:var(--orange)}

/* login */
#loginCard{text-align:center;padding:34px 22px}
#loginCard p{color:var(--mut);font-size:14px;margin-bottom:16px}
.login-row{display:flex;gap:8px;max-width:380px;margin:0 auto}
#nameInput{
  flex:1;padding:13px 16px;border-radius:12px;border:1px solid var(--line);
  background:rgba(245,243,247,.06);color:var(--cream);font-family:var(--mono);font-size:14px;outline:none;
}
#nameInput:focus{border-color:var(--green)}
.gbtn{
  cursor:pointer;border:none;border-radius:12px;padding:13px 22px;font-weight:700;font-size:14px;
  background:var(--grad);color:#fff;transition:transform .15s;font-family:var(--kr);
}
.gbtn:hover{transform:translateY(-1px)}

/* hero balance */
.hero{
  display:flex;justify-content:space-between;align-items:center;gap:16px;flex-wrap:wrap;
  border-radius:18px;padding:22px;margin-bottom:18px;
  background:linear-gradient(var(--ink),var(--ink)) padding-box, var(--grad) border-box;
  border:2px solid transparent;
}
.hero .who{font-family:var(--mono);font-size:13px;color:var(--mut)}
.hero .who b{color:var(--cream);font-size:16px}
.hero .tier-badge{
  font-family:var(--mono);font-size:11px;letter-spacing:.14em;padding:4px 12px;border-radius:999px;
  border:1px solid var(--line);color:var(--green);margin-left:8px;
}
.hero .pts{text-align:right}
.hero .pts .n{
  font-family:var(--mono);font-weight:700;font-size:clamp(34px,6vw,48px);line-height:1.1;
  background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent;
  transition:transform .2s;display:inline-block;
}
.hero .pts .n.bump{transform:scale(1.15)}
.hero .pts .l{font-family:var(--mono);font-size:11px;letter-spacing:.25em;color:var(--mut)}
.progress{width:100%;margin-top:6px}
.progress .bar{height:6px;border-radius:3px;background:var(--line);overflow:hidden}
.progress .bar i{display:block;height:100%;background:var(--grad);border-radius:3px;transition:width .5s cubic-bezier(.2,.8,.25,1)}
.progress .txt{font-family:var(--mono);font-size:11px;color:var(--mut);margin-top:6px}

/* earn */
.earn-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px}
.earn{
  cursor:pointer;border:1px solid var(--line);background:rgba(245,243,247,.04);color:var(--cream);
  border-radius:14px;padding:16px 14px;text-align:left;font-family:var(--kr);
  transition:border-color .15s, transform .1s;
}
.earn:hover{border-color:rgba(55,214,122,.55)}
.earn:active{transform:scale(.97)}
.earn .ico{font-size:20px;margin-bottom:6px}
.earn .t{font-weight:700;font-size:14px}
.earn .pt{font-family:var(--mono);font-size:12px;color:var(--green)}

/* tiers */
.tiers{display:flex;flex-direction:column;gap:10px}
.tier{
  display:flex;align-items:center;gap:14px;border:1px solid var(--line);border-radius:14px;
  padding:14px 16px;background:rgba(245,243,247,.03);transition:border-color .3s;
}
.tier.now{border-color:var(--pink);background:rgba(236,72,153,.08)}
.tier.done{border-color:rgba(55,214,122,.4)}
.tier .badge{
  font-family:var(--mono);font-size:11px;letter-spacing:.1em;min-width:86px;text-align:center;
  padding:6px 8px;border-radius:8px;border:1px solid var(--line);color:var(--mut);
}
.tier.done .badge{color:var(--green);border-color:rgba(55,214,122,.4)}
.tier.now .badge{color:var(--pink);border-color:rgba(236,72,153,.5)}
.tier .info{flex:1}
.tier .info .r{font-weight:700;font-size:14px}
.tier .info .p{font-family:var(--mono);font-size:12px;color:var(--mut)}
.tier .st{font-family:var(--mono);font-size:12px;color:var(--mut)}
.tier.done .st{color:var(--green)}

/* redeem */
.redeems{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:10px}
.rd{
  border:1px solid var(--line);border-radius:14px;padding:16px;background:rgba(245,243,247,.03);
  display:flex;flex-direction:column;gap:8px;
}
.rd .t{font-weight:700;font-size:14px}
.rd .c{font-family:var(--mono);font-size:12px;color:var(--orange)}
.rd button{
  cursor:pointer;border:1px solid var(--line);background:rgba(245,243,247,.06);color:var(--cream);
  border-radius:10px;padding:9px;font-family:var(--kr);font-size:13px;font-weight:600;
  transition:background .15s,border-color .15s;
}
.rd button:not(:disabled):hover{border-color:var(--pink);background:rgba(236,72,153,.12)}
.rd button:disabled{opacity:.35;cursor:not-allowed}

/* log */
.log{font-family:var(--mono);font-size:12px;color:var(--mut);max-height:180px;overflow-y:auto;line-height:2}
.log div b{color:var(--green)}
.log div i{font-style:normal;color:var(--orange)}

.footrow{display:flex;justify-content:space-between;align-items:center;margin-top:8px;flex-wrap:wrap;gap:10px}
.reset{
  cursor:pointer;background:none;border:1px dashed var(--line);color:var(--mut);
  border-radius:10px;padding:8px 16px;font-family:var(--mono);font-size:11px;letter-spacing:.1em;
}
.reset:hover{color:var(--cream);border-color:var(--mut)}
footer{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:rgba(245,243,247,.35)}
footer span{color:var(--green)}

/* toast + confetti */
#toast{
  position:fixed;left:50%;bottom:34px;transform:translate(-50%,20px);z-index:60;
  background:rgba(6,5,7,.9);border:1px solid var(--line);border-radius:999px;
  padding:12px 24px;font-size:14px;opacity:0;transition:opacity .3s, transform .3s;pointer-events:none;
  backdrop-filter:blur(6px);
}
#toast.show{opacity:1;transform:translate(-50%,0)}
#toast b{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.confetti{position:fixed;inset:0;pointer-events:none;z-index:50}
.hidden{display:none!important}

@media (max-width:520px){
  body{padding:22px 14px 44px}
  .hero .pts{text-align:left}
}
</style>
</head>

  function addLog(msg){
    S.log.unshift("["+new Date().toLocaleTimeString("ko-KR",{hour12:false})+"] "+msg);
    if(S.log.length>60) S.log.pop();
  }

  function toast(html){
    var t = document.getElementById("toast");
    t.innerHTML = html;
    t.classList.add("show");
    clearTimeout(t._h);
    t._h = setTimeout(function(){ t.classList.remove("show"); }, 2600);
  }

  function render(){
    document.getElementById("memberName").textContent = S.name;
    var cur = tierOf(S.pts), nxt = nextTier(S.pts);
    document.getElementById("tierBadge").textContent = cur.name;
    ptsEl.textContent = S.pts.toLocaleString("ko-KR");
    ptsEl.classList.add("bump");
    setTimeout(function(){ ptsEl.classList.remove("bump"); }, 220);

    var fill, txt;
    if(nxt){
      var base = cur.min;
      fill = Math.min(100, (S.pts-base)/(nxt.min-base)*100);
      txt = "다음 티어 " + nxt.name + "까지 " + (nxt.min-S.pts).toLocaleString("ko-KR") + "P";
    } else { fill = 100; txt = "최고 티어 ROOT 달성! 🎉"; }
    document.getElementById("progFill").style.width = fill+"%";
    document.getElementById("progTxt").textContent = txt;

    // tiers
    var tw = document.getElementById("tiers"); tw.innerHTML = "";
    TIERS.forEach(function(t){
      var d = document.createElement("div");
      d.className = "tier" + (S.pts>=t.min ? " done" : "") + (t.name===cur.name ? " now" : "");
      d.innerHTML = '<div class="badge">'+t.name+'</div>'
        + '<div class="info"><div class="r">'+t.reward+'</div><div class="p">'+t.min.toLocaleString("ko-KR")+'P 이상</div></div>'
        + '<div class="st">'+(S.pts>=t.min ? "UNLOCKED" : "LOCKED")+'</div>';
      tw.appendChild(d);
    });

    // redeems
    var rw = document.getElementById("redeems"); rw.innerHTML = "";
    REDEEMS.forEach(function(r){
      var d = document.createElement("div");
      d.className = "rd";
      d.innerHTML = '<div class="t">'+r.name+'</div><div class="c">'+r.cost.toLocaleString("ko-KR")+'P</div>';
      var b = document.createElement("button");
      b.textContent = S.pts>=r.cost ? "교환하기" : "포인트 부족";
      b.disabled = S.pts<r.cost;
      b.addEventListener("click", function(){
        S.pts -= r.cost;
        addLog(r.name+" 교환 <i>-"+r.cost+"P</i>");
        save(); render();
        toast("🎁 <b>"+r.name+"</b> 교환 완료!");
      });
      d.appendChild(b);
      rw.appendChild(d);
    });

    // log
    var lg = document.getElementById("log");
    lg.innerHTML = S.log.map(function(x){ return "<div>"+x+"</div>"; }).join("") || '<div>아직 활동이 없습니다.</div>';
  }

  function earn(pts, act){
    var before = tierOf(S.pts);
    S.pts += pts;
    addLog(act+" <b>+"+pts+"P</b>");
    var after = tierOf(S.pts);
    save(); render();
    if(after.min > before.min){
      toast("🚀 <b>"+after.name+"</b> 티어 승급! — "+after.reward);
      confetti();
    } else {
      toast(act+" <b>+"+pts+"P</b> 적립!");
    }
  }

  // ---- confetti ----
  var cv = document.getElementById("confetti"), cx = cv.getContext("2d"), parts=[], raf=null;
  var COLORS = ["#FF8C42","#EC4899","#8B5CF6","#37d67a","#F5F3F7"];
  function confetti(){
    cv.width = innerWidth; cv.height = innerHeight;
    parts = [];
    for(var i=0;i<150;i++){
      parts.push({x:Math.random()*cv.width, y:-20-Math.random()*cv.height*0.4,
        w:6+Math.random()*7, h:8+Math.random()*10, vy:2+Math.random()*3.5, vx:-1.2+Math.random()*2.4,
        rot:Math.random()*Math.PI, vr:-0.12+Math.random()*0.24,
        color:COLORS[Math.floor(Math.random()*COLORS.length)]});
    }
    var start = performance.now();
    cancelAnimationFrame(raf);
    (function loop(now){
      cx.clearRect(0,0,cv.width,cv.height);
      var alive=false;
      parts.forEach(function(p){
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.02;
        if(p.y<cv.height+30) alive=true;
        cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
        cx.fillStyle=p.color; cx.fillRect(-p.w/2,-p.h/2,p.w,p.h); cx.restore();
      });
      if(alive && now-start<5000) raf=requestAnimationFrame(loop);
      else cx.clearRect(0,0,cv.width,cv.height);
    })(start);
  }

  // ---- wiring ----
  function start(name){
    if(!S || S.name!==name){
      S = {name:name, pts:0, log:[]};
      addLog("클럽 가입 완료 — 환영합니다, "+name+"님!");
    }
    save();
    document.getElementById("loginCard").classList.add("hidden");
    document.getElementById("app").classList.remove("hidden");
    render();
  }

  document.getElementById("loginBtn").addEventListener("click", function(){
    var n = document.getElementById("nameInput").value.trim();
    if(!n) return;
    start(n);
  });
  document.getElementById("nameInput").addEventListener("keydown", function(e){
    if(e.key==="Enter") document.getElementById("loginBtn").click();
  });

  document.querySelectorAll(".earn").forEach(function(b){
    b.addEventListener("click", function(){
      earn(+b.dataset.pts, b.dataset.act);
    });
  });

  document.getElementById("resetBtn").addEventListener("click", function(){
    localStorage.removeItem(KEY);
    S = null;
    document.getElementById("app").classList.add("hidden");
    document.getElementById("loginCard").classList.remove("hidden");
    document.getElementById("nameInput").value = "";
  });

  // resume session
  load();
  if(S && S.name) start(S.name);
})();
</script>

<style>
@media (pointer:fine){
  body, body *{cursor:none !important}
  #cur{position:fixed;z-index:99999;width:9px;height:9px;border-radius:50%;
    background:linear-gradient(100deg,#FF8C42,#EC4899,#8B5CF6);
    pointer-events:none;transform:translate(-50%,-50%);transition:width .18s,height .18s;left:-100px;top:-100px}
  #curG{position:fixed;z-index:99998;width:38px;height:38px;border-radius:50%;
    border:1.5px solid rgba(236,72,153,.5);pointer-events:none;
    transform:translate(-50%,-50%);transition:width .22s,height .22s,border-color .22s;left:-100px;top:-100px}
  #cur.hov{width:15px;height:15px}
  #curG.hov{width:58px;height:58px;border-color:rgba(55,214,122,.85)}
  #cur.hide,#curG.hide{opacity:0}
}
@media (pointer:coarse){#cur,#curG{display:none}}
</style>
<div id="cur"></div><div id="curG"></div>
<script>
(function(){
  var c=document.getElementById("cur"),g=document.getElementById("curG");
  if(!c||!matchMedia("(pointer:fine)").matches)return;
  var mx=-100,my=-100,gx=-100,gy=-100;
  document.addEventListener("mousemove",function(e){
    mx=e.clientX;my=e.clientY;
    c.style.left=mx+"px";c.style.top=my+"px";
    var hov=e.target.closest&&e.target.closest("a,button,input,select,textarea,label,.tile,.earn,.btn,.gen,.card[data-tilt]");
    c.classList.toggle("hov",!!hov);g.classList.toggle("hov",!!hov);
    c.classList.remove("hide");g.classList.remove("hide");
  });
  document.addEventListener("mouseleave",function(){c.classList.add("hide");g.classList.add("hide");});
  (function loop(){gx+=(mx-gx)*.16;gy+=(my-gy)*.16;g.style.left=gx+"px";g.style.top=gy+"px";requestAnimationFrame(loop);})();
})();
</script>
