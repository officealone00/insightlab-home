<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>터미널군 퍼즐 — InsightLab</title>
<style>
:root{
  --ink:#060507;
  --cream:#F5F3F7;
  --mut:rgba(245,243,247,.60);
  --line:rgba(245,243,247,.12);
  --card:rgba(245,243,247,.045);
  --orange:#FF8C42;
  --pink:#EC4899;
  --purple:#8B5CF6;
  --green:#37d67a;
  --grad:linear-gradient(100deg,#FF8C42 0%,#EC4899 52%,#8B5CF6 100%);
  --mono:"JetBrains Mono",ui-monospace,Consolas,monospace;
  --kr:"Pretendard",system-ui,-apple-system,"Segoe UI",sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box;word-break:keep-all;overflow-wrap:break-word;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:var(--ink);color:var(--cream);font-family:var(--kr);
  line-height:1.75;display:flex;flex-direction:column;align-items:center;
  min-height:100dvh;padding:28px 16px 48px;
}
body::before{
  content:"";position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(700px 380px at 15% -5%, rgba(255,140,66,.10), transparent 60%),
    radial-gradient(700px 420px at 90% 0%, rgba(139,92,246,.12), transparent 60%),
    radial-gradient(600px 400px at 50% 110%, rgba(236,72,153,.08), transparent 60%);
}
main{position:relative;z-index:1;width:100%;max-width:520px;display:flex;flex-direction:column;align-items:center}

header{width:100%;text-align:center;margin-bottom:22px}
.brand{
  font-family:var(--mono);font-size:12px;letter-spacing:.22em;color:var(--mut);
  text-transform:uppercase;margin-bottom:10px;
}
.brand b{color:var(--cream);font-weight:700}
h1{
  font-size:clamp(26px,6vw,36px);font-weight:800;line-height:1.35;letter-spacing:-.01em;
}
h1 .grad{background:var(--grad);-webkit-background-clip:text;background-clip:text;color:transparent}
.sub{margin-top:8px;font-size:14px;color:var(--mut);line-height:1.8}
.sub code{font-family:var(--mono);color:var(--green);font-size:13px}

.hud{
  width:100%;display:flex;justify-content:space-between;align-items:center;
  margin-bottom:14px;font-family:var(--mono);font-size:13px;color:var(--mut);
}
.hud .moves b{color:var(--cream);font-size:15px}
.hud button{
  font-family:var(--mono);font-size:12px;letter-spacing:.08em;cursor:pointer;
  background:var(--card);color:var(--cream);border:1px solid var(--line);
  padding:8px 16px;border-radius:10px;transition:border-color .2s,transform .1s;
}
.hud button:hover{border-color:var(--pink)}
.hud button:active{transform:scale(.96)}

.board-wrap{
  position:relative;width:100%;aspect-ratio:1;
  border-radius:20px;padding:8px;
  background:linear-gradient(var(--ink),var(--ink)) padding-box, var(--grad) border-box;
  border:2px solid transparent;
  box-shadow:0 24px 60px rgba(0,0,0,.55), 0 0 80px rgba(236,72,153,.10);
}
.board{
  position:relative;width:100%;height:100%;border-radius:13px;overflow:hidden;
  background:#0d0c10;
}
.tile{
  position:absolute;width:calc(100%/3);height:calc(100%/3);
  background-image:var(--puzzle-img);background-size:300% 300%;
  border-radius:8px;cursor:pointer;user-select:none;
  transition:transform .18s cubic-bezier(.2,.8,.25,1), opacity .5s;
  box-shadow:inset 0 0 0 1px rgba(6,5,7,.6);
}
.tile:hover{filter:brightness(1.06)}
.tile.ghost{opacity:0;pointer-events:none;transition:opacity 1.1s ease}
.board.solved .tile{cursor:default;border-radius:0;box-shadow:none}
.board.solved .tile.ghost{opacity:1}

.overlay{
  position:absolute;inset:0;z-index:5;display:flex;flex-direction:column;
  align-items:center;justify-content:center;text-align:center;gap:14px;
  background:rgba(6,5,7,.82);backdrop-filter:blur(6px);border-radius:13px;
  opacity:0;pointer-events:none;transition:opacity .6s ease .9s;padding:24px;
}
.overlay.show{opacity:1;pointer-events:auto}
.overlay .win{
  font-family:var(--mono);font-size:13px;letter-spacing:.25em;color:var(--green);
}
.overlay h2{font-size:clamp(22px,5.5vw,30px);font-weight:800;line-height:1.4}
.overlay p{font-size:14px;color:var(--mut);line-height:1.8;max-width:34ch}
.overlay .cta{
  display:inline-block;margin-top:6px;padding:14px 28px;border-radius:999px;
  background:var(--grad);color:#fff;font-weight:700;font-size:15px;
  text-decoration:none;transition:transform .15s, box-shadow .15s;
  box-shadow:0 10px 30px rgba(236,72,153,.35);
}
.overlay .cta:hover{transform:translateY(-2px);box-shadow:0 14px 38px rgba(236,72,153,.5)}
.overlay .again{
  font-family:var(--mono);font-size:12px;color:var(--mut);background:none;
  border:none;cursor:pointer;text-decoration:underline;text-underline-offset:4px;
}
.overlay .again:hover{color:var(--cream)}

.drop-hint{
  margin-top:18px;width:100%;text-align:center;font-size:13px;color:var(--mut);
  border:1px dashed var(--line);border-radius:14px;padding:14px 16px;line-height:1.8;
  transition:border-color .2s,background .2s;
}
.drop-hint.drag{border-color:var(--green);background:rgba(55,214,122,.06);color:var(--cream)}
.drop-hint code{font-family:var(--mono);color:var(--orange);font-size:12px}

footer{
  margin-top:26px;font-family:var(--mono);font-size:11px;letter-spacing:.14em;
  color:rgba(245,243,247,.35);text-align:center;line-height:2;
}
footer span{color:var(--green)}

.confetti{position:fixed;inset:0;pointer-events:none;z-index:50}

@media (max-width:420px){
  body{padding:20px 12px 36px}
  .hud{font-size:12px}
  .sub{font-size:13px}
  .drop-hint{font-size:12px;padding:12px}
}
</style>
</head>
<body>
<main>
  <header>
    <div class="brand"><b>InsightLab</b> · LBS STUDIO · GWANGJU</div>
    <h1>터미널군을 <span class="grad">맞춰보세요</span></h1>
    <p class="sub">타일을 눌러서 인사이트랩의 마스코트를 완성하세요. <code>&gt; I AM AI</code></p>
  </header>

  <div class="hud">
    <div class="moves">MOVES <b id="moves">0</b></div>
    <button id="shuffleBtn" type="button">RESHUFFLE</button>
  </div>

  <div class="board-wrap">
    <div class="board" id="board">
      <div class="overlay" id="overlay">
        <div class="win">&gt; PUZZLE SOLVED_</div>
        <h2>터미널군 완성!</h2>
        <p>공공데이터와 AI로 지역을 잇는 위치정보 스튜디오, 인사이트랩이 만들었습니다.</p>
        <a class="cta" href="https://insightlab.rodyinsight.workers.dev" target="_blank" rel="noopener">인사이트랩 보러가기 ↗</a>
        <button class="again" id="againBtn" type="button">다시 하기</button>
      </div>
    </div>
  </div>

  <div class="drop-hint" id="dropHint">
    브랜드 사진을 여기로 <b>드래그</b>하면 퍼즐이 그 이미지로 다시 만들어집니다. <code>drag &amp; drop</code>
  </div>

  <footer>INSIGHTLAB · CONNECTING REGIONS WITH DATA &amp; AI · <span>&gt; I AM AI</span></footer>
</main>

<canvas class="confetti" id="confetti"></canvas>

  var board = document.getElementById("board");
  var overlay = document.getElementById("overlay");
  var movesEl = document.getElementById("moves");
  var N = 3, moves = 0, solvedFlag = false;
  // grid[pos] = tileIndex (0..8), 8 = empty slot's tile (the hidden 9th piece)
  var grid = [];
  var tiles = []; // tile elements by tileIndex

  document.documentElement.style.setProperty("--puzzle-img", "url('"+IMG+"')");

  function buildTiles(){
    tiles.forEach(function(t){ t.remove(); });
    tiles = [];
    for(var i=0;i<9;i++){
      var t = document.createElement("div");
      t.className = "tile";
      var r = Math.floor(i/N), c = i%N;
      t.style.backgroundPosition = (c*50)+"% "+(r*50)+"%";
      if(i===8) t.classList.add("ghost");
      t.dataset.tile = i;
      t.addEventListener("click", onTileClick);
      board.appendChild(t);
      tiles.push(t);
    }
  }

  function render(){
    for(var pos=0;pos<9;pos++){
      var ti = grid[pos];
      var r = Math.floor(pos/N), c = pos%N;
      tiles[ti].style.transform = "translate("+(c*100)+"%,"+(r*100)+"%)";
    }
  }

  function emptyPos(){ return grid.indexOf(8); }

  function isSolvable(arr){
    // count inversions among the 8 real tiles
    var inv = 0, flat = arr.filter(function(x){return x!==8;});
    for(var i=0;i<flat.length;i++)
      for(var j=i+1;j<flat.length;j++)
        if(flat[i]>flat[j]) inv++;
    // 3x3 (odd width): solvable iff inversions even
    return inv % 2 === 0;
  }

  function isSolved(){
    for(var i=0;i<9;i++) if(grid[i]!==i) return false;
    return true;
  }

  function shuffle(){
    do{
      grid = [0,1,2,3,4,5,6,7,8];
      for(var i=grid.length-1;i>0;i--){
        var j = Math.floor(Math.random()*(i+1));
        var tmp = grid[i]; grid[i]=grid[j]; grid[j]=tmp;
      }
    }while(!isSolvable(grid) || isSolved());
    moves = 0; solvedFlag = false;
    movesEl.textContent = "0";
    board.classList.remove("solved");
    overlay.classList.remove("show");
    render();
  }

  function tryMovePos(pos){
    if(solvedFlag) return;
    var e = emptyPos();
    var pr=Math.floor(pos/N), pc=pos%N, er=Math.floor(e/N), ec=e%N;
    if(Math.abs(pr-er)+Math.abs(pc-ec)!==1) return;
    grid[e] = grid[pos];
    grid[pos] = 8;
    moves++; movesEl.textContent = String(moves);
    render();
    if(isSolved()) win();
  }

  function onTileClick(ev){
    var ti = +ev.currentTarget.dataset.tile;
    tryMovePos(grid.indexOf(ti));
  }

  document.addEventListener("keydown", function(ev){
    var e = emptyPos(), er=Math.floor(e/N), ec=e%N, target=-1;
    // arrow = direction the tile slides
    if(ev.key==="ArrowUp"    && er<N-1) target = e+N;
    if(ev.key==="ArrowDown"  && er>0)   target = e-N;
    if(ev.key==="ArrowLeft"  && ec<N-1) target = e+1;
    if(ev.key==="ArrowRight" && ec>0)   target = e-1;
    if(target>=0){ ev.preventDefault(); tryMovePos(target); }
  });

  function win(){
    solvedFlag = true;
    board.classList.add("solved");
    overlay.classList.add("show");
    confetti();
  }

  // ---- confetti ----
  var cv = document.getElementById("confetti"), cx = cv.getContext("2d");
  var parts = [], raf = null;
  var COLORS = ["#FF8C42","#EC4899","#8B5CF6","#37d67a","#F5F3F7"];
  function confetti(){
    cv.width = innerWidth; cv.height = innerHeight;
    parts = [];
    for(var i=0;i<160;i++){
      parts.push({
        x: Math.random()*cv.width,
        y: -20 - Math.random()*cv.height*0.5,
        w: 6+Math.random()*7, h: 8+Math.random()*10,
        vy: 2+Math.random()*3.5, vx: -1.2+Math.random()*2.4,
        rot: Math.random()*Math.PI, vr: -0.12+Math.random()*0.24,
        color: COLORS[Math.floor(Math.random()*COLORS.length)]
      });
    }
    var start = performance.now();
    cancelAnimationFrame(raf);
    (function loop(now){
      cx.clearRect(0,0,cv.width,cv.height);
      var alive = false;
      parts.forEach(function(p){
        p.x+=p.vx; p.y+=p.vy; p.rot+=p.vr; p.vy+=0.02;
        if(p.y < cv.height+30) alive = true;
        cx.save(); cx.translate(p.x,p.y); cx.rotate(p.rot);
        cx.fillStyle = p.color;
        cx.fillRect(-p.w/2,-p.h/2,p.w,p.h);
        cx.restore();
      });
      if(alive && now-start<6000) raf = requestAnimationFrame(loop);
      else cx.clearRect(0,0,cv.width,cv.height);
    })(start);
  }

  // ---- drag & drop custom image ----
  var hint = document.getElementById("dropHint");
  ["dragenter","dragover"].forEach(function(evName){
    document.addEventListener(evName, function(ev){
      ev.preventDefault(); hint.classList.add("drag");
    });
  });
  ["dragleave","drop"].forEach(function(evName){
    document.addEventListener(evName, function(ev){
      ev.preventDefault(); if(evName==="dragleave" && ev.relatedTarget) return;
      hint.classList.remove("drag");
    });
  });
  document.addEventListener("drop", function(ev){
    ev.preventDefault();
    var f = ev.dataTransfer && ev.dataTransfer.files && ev.dataTransfer.files[0];
    if(!f || !/^image\//.test(f.type)) return;
    var rd = new FileReader();
    rd.onload = function(){
      var img = new Image();
      img.onload = function(){
        // center-square crop via canvas for clean tiles
        var s = Math.min(img.width, img.height);
        var c = document.createElement("canvas");
        c.width = c.height = 900;
        c.getContext("2d").drawImage(img,(img.width-s)/2,(img.height-s)/2,s,s,0,0,900,900);
        document.documentElement.style.setProperty("--puzzle-img","url('"+c.toDataURL("image/jpeg",0.88)+"')");
        shuffle();
      };
      img.src = rd.result;
    };
    rd.readAsDataURL(f);
  });

  document.getElementById("shuffleBtn").addEventListener("click", shuffle);
  document.getElementById("againBtn").addEventListener("click", shuffle);

  buildTiles();
  shuffle();
})();
</script>
